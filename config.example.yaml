# Pixelle-Video Configuration
# Copy this file to config.yaml and fill in your settings

project_name: Pixelle-Video

# ==================== LLM Configuration ====================
llm:
  api_key: ""
  base_url: ""
  model: ""

# ==================== ComfyUI Configuration ====================
comfyui:
  comfyui_url: http://127.0.0.1:8188
  comfyui_api_key: ""
  runninghub_api_key: ""
  runninghub_concurrent_limit: 1
  runninghub_instance_type: "24g"  # 24g | 48g

  tts:
    default_workflow: selfhost/tts_edge.json

  image:
    default_workflow: runninghub/image_flux.json
    prompt_prefix: "Minimalist black-and-white matchstick figure style illustration, clean lines, simple sketch style"

  video:
    default_workflow: runninghub/video_wan2.1_fusionx.json
    prompt_prefix: ""

# ==================== Video Generation Defaults ====================
generation:
  quality_preset: "standard"  # draft | standard | high | ultra
  subtitles: false
  subtitles_position: "bottom"  # bottom | top
  transition: "none"  # none | crossfade | fade_in_out | slide_left | zoom_in
  multi_voice: []  # List of TTS voice names, e.g. ["zh_CN_XiaoxiaoNeural", "zh_CN_YunjianNeural"]
  watermark_text: ""  # Optional text watermark
  watermark_position: "bottom_right"

# ==================== Template Configuration ====================
template:
  default_template: "1080x1920/image_default.html"

# ==================== Notification Configuration ====================
notification:
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    username: ""
    password: ""
    from_addr: ""
    to_addr: ""

  webhook:
    events: ["task.completed", "task.failed"]  # webhook URLs configured via UI

# ==================== Auth Configuration ====================
auth:
  enabled: false  # Set true to require login
  default_admin_password: "admin123"  # Change after first login

# ==================== Cloud Storage ====================
cloud_storage:
  provider: "local"  # local | s3 | oss
  public_dir: "data/public"
  base_url: "http://localhost:8000"
  # S3 config (when provider=s3):
  # s3_endpoint: ""
  # s3_bucket: ""
  # s3_region: "us-east-1"
  # s3_access_key: ""
  # s3_secret_key: ""

# ==================== JianYing/CapCut Export ====================
jianying:
  version: "5.9"  # 5.9 | 6.0
  draft_dir: "data/jianying_exports"

# ==================== Rate Limiting ====================
rate_limit:
  enabled: true
  requests_per_second: 10
  burst: 20
